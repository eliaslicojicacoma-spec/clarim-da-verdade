<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O País — Clube de Motas do Moxico</title>

  <!-- Fontes Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />

<body>

  <!-- NAVEGAÇÃO -->
  <nav id="navbar">
    <a href="#hero" class="nav-logo"><span>O</span> País</a>

    <ul class="nav-links">
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#valores">Valores</a></li>
      <li><a href="#actividades">Actividades</a></li>
      <li><a href="#adesao">Aderir</a></li>
    </ul>

    <button class="nav-toggle" id="navToggle" aria-label="Abrir menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <h1>Clube <span>O País</span></h1>

  <section id="newsletter">

    <form id="newsletterForm">
      <input type="email" id="newsletterEmail" placeholder="O teu email" required />

    <p id="newsletterMsg"></p>

  <script src="main.js"></script>
